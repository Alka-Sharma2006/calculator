<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="calculator">
        <div id="buttons">
            <button class="box" id="box-1">AC</button>
            <button class="box" id="box-2">DEL</button>
            <button class="box" id="box-3">%</button>
            <button class="box org" id="box-4">/</button>
            <button class="box" id="box-5">7</button>
            <button class="box" id="box-6">8</button>
            <button class="box" id="box-7">9</button>
            <button class="box org" id="box-8">*</button>
            <button class="box" id="box-9">4</button>
            <button class="box" id="box-10">5</button>
            <button class="box" id="box-11">6</button>
            <button class="box org" id="box-12">-</button>
            <button class="box" id="box-13">1</button>
            <button class="box" id="box-14">2</button>
            <button class="box" id="box-15">3</button>
            <button class="box org" id="box-16">+</button>
            <button class="box" id="box-17">00</button>
            <button class="box" id="box-18">0</button>
            <button class="box" id="box-19">.</button>
            <button class="box org" id="box-20">=</button>
        </div>

    </div>
</body>
</html>
