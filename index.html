<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="calculator">
        <input type="text" id="result" value="" >
        <div id="buttons">
            <button class="box" id="box-1" value="ac">AC</button>
            <button class="box" id="box-2" value="DEL">DEL</button>
            <button class="box" id="box-3" value="%">%</button>
            <button class="box org" id="box-4" value="/">/</button>
            <button class="box" id="box-5" value="7">7</button>
            <button class="box" id="box-6" value="8">8</button>
            <button class="box" id="box-7" value="9">9</button>
            <button class="box org" id="box-8" value="*">*</button>
            <button class="box" id="box-9" value="4">4</button>
            <button class="box" id="box-10" value="5">5</button>
            <button class="box" id="box-11" value="6">6</button>
            <button class="box org" id="box-12" value="-">-</button>
            <button class="box" id="box-13" value="1">1</button>
            <button class="box" id="box-14" value="2">2</button>
            <button class="box" id="box-15" value="3">3</button>
            <button class="box org" id="box-16" value="+">+</button>
            <button class="box" id="box-17" value="00">00</button>
            <button class="box" id="box-18" value="0">0</button>
            <button class="box" id="box-19" value=".">.</button>
            <button class="box org" id="box-20" value="=">=</button>
        </div>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
